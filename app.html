    if ((hasDishIndicator || line.length >= 10) && line.length <= 80) {

      );
      if (commaIdx !== Infinity && commaIdx >= 3) {
        dishName = line.substring(0, commaIdx);
      } else {
        dishName = line.length > 10 ? line.substring(0, 8) : line;
      }
      // 杩囨护澶煭/澶儚鐜鐨勮彍鍚?      const envOnly = ['鐜','瑁呬慨','鐏厜','姘涘洿','鎺掗槦','鏈嶅姟'];

        // 鎻愬彇浠锋牸

        const nums = line.match(/\d{2,4}/g);
        if (nums) {

          if (p.length > 0) dishPrice = p[0];
        }
        // 鎻愬彇鎰熷畼璇?        let sensory = '';
        const sensoryWords = ['瀚?,'鑴?,'棣?,'椴?,'鐢?,'杈?,'杞?,'绯?,'閰?,'寮?,'婊?,'鍏ュ彛','鍥炲懗'];
        for (const sw of sensoryWords) {
          const idx = line.indexOf(sw);
          if (idx >= 0) {
            const start = Math.max(0, idx - 2);
            const end = Math.min(line.length, idx + 6);
            sensory = line.substring(start, end);
            break;
          }
        }
        result.dishes.push({
          name: dishName.trim(),
          price: dishPrice,
          sensory: sensory || line.substring(0, 20),

  const seen = new Set();
  result.dishes = result.dishes.filter(d => {
    const key = d.name.substring(0, 4);
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  return result.dishes.length > 0 || result.envClues.length > 0 ? result : null;
}

    if (currentStep > 0) {
      const prev = document.getElementById('step' + (currentStep - 1));

    if (currentStep < steps.length) {

function pickDishesWithComments(type, count, parsedComments) {
  const pool = DISH_TEMPLATES[type] || DISH_TEMPLATES.street_shop;
  if (!parsedComments || parsedComments.dishes.length === 0) {
    return { dishes: pick(pool, count), fromComments: false };
  }

  // 娣锋惌锛氳瘎璁轰腑鐨勮彍鍝?+ 妯℃澘琛ュ厖
  const commentDishes = parsedComments.dishes.slice(0, Math.min(count, parsedComments.dishes.length));
  const result = [];

  for (const cd of commentDishes) {
    // 浠庢ā鏉挎睜涓壘鏈€鍖归厤鐨勬ā鏉垮仛鎰熷畼琛ュ厖
    const baseTemplate = pool[result.length % pool.length];
    const merged = {
      name: cd.name,
      visual: cd.sensory.includes('绔笂鏉?) || cd.sensory.includes('鎽嗙洏') ? cd.sensory : (baseTemplate ? baseTemplate.visual : cd.sensory),
      smell: baseTemplate ? baseTemplate.smell : '',
      taste: cd.sensory || (baseTemplate ? baseTemplate.taste : ''),
      touch: baseTemplate ? baseTemplate.touch : '',
      audio: baseTemplate ? baseTemplate.audio : '',
      price: cd.price ? String(cd.price) : (baseTemplate ? baseTemplate.price : ''),
      compare: baseTemplate ? baseTemplate.compare : '',
      fromComment: true
    };
    result.push(merged);
  }

  // 濡傛灉璇勮鑿滃搧涓嶅锛岃ˉ妯℃澘
  if (result.length < count) {
    const remaining = pick(pool, count - result.length);
    result.push(...remaining);
  }

  return { dishes: result, fromComments: true };
}

function unlockEssay() {
  const blur = document.getElementById('paywallBlur');
  const overlay = document.getElementById('paywallOverlay');
  if (blur) blur.classList.add('unlocked');
  if (overlay) overlay.classList.add('hidden');

  window._essayUnlocked = true;

  // 绉婚櫎棰勮鏉?  const previewCount = document.querySelector('.preview-count');
  if (previewCount) previewCount.style.display = 'none';

  // 绉婚櫎鎴柇鏍囪
  const cutIndicator = document.querySelector('.cut-indicator');
  if (cutIndicator) cutIndicator.style.display = 'none';

  updateCopyButton();
  showToast('宸茶В閿佸畬鏁寸増');
}

function updateCopyButton() {
  const btnCopy = document.getElementById('btnCopy');
  if (!btnCopy) return;
  if (window._essayNeedsPaywall && !window._essayUnlocked) {
    btnCopy.disabled = true;
    btnCopy.innerHTML = `<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5" y="5" width="10" height="10" rx="2"/><path d="M1 11V3a2 2 0 012-2h8"/></svg> 浠樿垂瑙ｉ攣鍚庡彲澶嶅埗`;
  } else {
    btnCopy.disabled = false;
    btnCopy.innerHTML = `<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5" y="5" width="10" height="10" rx="2"/><path d="M1 11V3a2 2 0 012-2h8"/></svg> 涓€閿鍒禶;
  }
}

function selectTitle(idx) {
  if (!window._essayResult) return;
  const result = window._essayResult;
  result.selectedTitle = result.titles[idx];
  document.querySelectorAll('.title-candidate').forEach(el => el.classList.remove('selected'));
  document.querySelector(`.title-candidate[data-idx="${idx}"]`)?.classList.add('selected');
  const titleEl = document.querySelector('.essay-title');
  if (titleEl) titleEl.textContent = result.selectedTitle.text;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function copyEssay() {
  if (!window._essayResult) return;
  if (window._essayNeedsPaywall && !window._essayUnlocked) {
    showToast('璇峰厛瑙ｉ攣瀹屾暣鐗?);
    return;
  }
  const r = window._essayResult;
  const text = `# ${r.selectedTitle.text}\n\n${r.paragraphs.join('\n\n')}`;
  navigator.clipboard.writeText(text).then(() => showToast('宸插鍒跺埌鍓创鏉?));
}

function downloadMd() {
  if (!window._essayResult) return;
  if (window._essayNeedsPaywall && !window._essayUnlocked) {
    showToast('璇峰厛瑙ｉ攣瀹屾暣鐗?);
    return;
  }
  const r = window._essayResult;
  const text = `# ${r.selectedTitle.text}\n\n${r.paragraphs.join('\n\n')}\n\n---\n*鐢?dianping-shiji v3.1 鐢熸垚 路 ${r.cfg.label}妯″紡${r.hasComments ? ' 路 璇勮椹卞姩' : ''}*`;
  const blob = new Blob([text], { type: 'text/markdown;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const safeName = r.shopName.replace(/[\\/:*?"<>|]/g, '_');
  a.href = url; a.download = `${safeName}_椋熻.md`; a.click();
  URL.revokeObjectURL(url);
  showToast('宸蹭笅杞?.md 鏂囦欢');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2000);
}
